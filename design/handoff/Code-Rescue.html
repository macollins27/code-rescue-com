    border-bottom: 1px solid rgba(245,242,236,0.4);
    text-decoration: none;
    transition: border-color 200ms;
  }
  .ilink-dark:hover { border-bottom-color: var(--bg); }

  /* ───────── Engage channels ───────── */
  .channels {
    margin: 40px 0 0;
    display: grid;
    grid-template-columns: 1.1fr 1fr 1fr;
    gap: 16px;
  }
  .channel {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 4px 16px;
    padding: 24px 28px;
    border: 1px solid rgba(245,242,236,0.3);
    background: rgba(245,242,236,0.05);
    color: var(--accent-ink);
    text-decoration: none;
    transition: background 200ms, border-color 200ms, transform 200ms;
  }
  .channel:hover {
    background: var(--bg);
    color: var(--accent-deep);
    border-color: var(--bg);
    transform: translateY(-2px);
  }
  .channel-primary {
    background: var(--bg);
    color: var(--accent-deep);
    border-color: var(--bg);
  }
  .channel-primary:hover {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .channel-k {
    grid-column: 1;
    grid-row: 1;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.7;
  }
  .channel-v {
    grid-column: 1;
    grid-row: 2;
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 500;
    line-height: 1.2;
  }
  .channel-arrow {
    grid-column: 2;
    grid-row: 1 / -1;
    align-self: center;
    font-family: var(--serif);
    font-size: 28px;
    opacity: 0.5;
    transition: transform 200ms, opacity 200ms;
  }
  .channel:hover .channel-arrow { opacity: 1; transform: translateX(4px); }
  .engage-facts {
    margin: 56px 0 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    padding-top: 32px;
    border-top: 1px solid rgba(245,242,236,0.25);
  }
  .engage-facts > div { display: flex; flex-direction: column; gap: 4px; }
  .engage-facts dt {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(245,242,236,0.55);
  }
  .engage-facts dd {
    margin: 0;
    font-family: var(--serif);
    font-size: 17px;
    color: var(--accent-ink);
  }

  /* ───────── Footer ───────── */
  .site-footer {
    background: var(--ink);
    color: var(--bg);
    padding: 72px 0 32px;
  }
  .footer-top {
    display: grid;
    grid-template-columns: 1.2fr 2fr;
    gap: 64px;
    padding-bottom: 48px;
    border-bottom: 1px solid rgba(245,242,236,0.15);
  }
  .footer-brand .brand { margin-bottom: 16px; }
  .footer-brand .brand-name { color: var(--bg); }
  .footer-brand .brand-mark { background: var(--accent); color: var(--bg); }
  .footer-tagline {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.55;
    color: rgba(245,242,236,0.7);
    margin: 0;
    max-width: 380px;
  }
  .footer-tagline .ilink { color: var(--bg); border-bottom-color: rgba(245,242,236,0.4); }
  .footer-tagline .ilink:hover { border-bottom-color: var(--bg); }
  .footer-cols {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }
  .footer-cols > div { display: flex; flex-direction: column; gap: 10px; }
  .footer-h {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(245,242,236,0.5);
    margin-bottom: 4px;
  }
  .footer-cols a, .footer-plain {
    font-size: 14px;
    color: rgba(245,242,236,0.85);
  }
  .footer-cols a:hover { color: var(--accent); }
  .footer-bot {
    padding-top: 24px;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .footer-bot .muted { color: rgba(245,242,236,0.5); }

  /* ───────── Responsive ───────── */
  @media (max-width: 900px) {
    .installed-grid { grid-template-columns: repeat(2, 1fr); }
    .pipeline { grid-template-columns: 1fr; }
    .deliv-grid { grid-template-columns: 1fr; }
    .notthis-grid { grid-template-columns: 1fr; gap: 32px; }
    .compare-v2-row { grid-template-columns: 1fr; gap: 16px; padding: 20px; }
    .price-range-row { grid-template-columns: 100px 1fr; }
    .price-range-row .price-range-note { grid-column: 2; }
    .price-range-bar { margin-left: 0; }
    .channels { grid-template-columns: 1fr; }
    .rule-row { grid-template-columns: 1fr; gap: 6px; }
    .footer-top { grid-template-columns: 1fr; gap: 32px; }
    .hero-meta, .engage-facts { grid-template-columns: 1fr; gap: 20px; }
  }
  @media (max-width: 640px) {
    .wrap { padding: 0 20px; }
    .hero { padding: 64px 0 48px; }
    .section { padding: 64px 0; }
    .topnav-links { gap: 16px; }
    .topnav-links a:not(.topnav-cta) { display: none; }
    .installed-grid { grid-template-columns: 1fr; }
    .hero-ctas { flex-direction: column; }
    .btn { width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    html { scroll-behavior: auto; }
  }
</style>
</head>
