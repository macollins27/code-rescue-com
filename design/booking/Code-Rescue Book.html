<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #f5f2ec; --bg-warm: #ede8dc; --bg-card: #ffffff;
    --ink: #1a1a1a; --ink-2: #2e2e2e; --ink-dim: #5a5a54; --ink-faint: #8a877e;
    --line: #d9d4c6; --line-2: #c8c2b2;
    --accent: #2a5f4f; --accent-deep: #1c443a; --accent-ink: #f5f2ec; --accent-faint: #dfe8e3;
    --serif: "Newsreader", Georgia, serif;
    --sans: "Inter", -apple-system, system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--accent); color: var(--accent-ink); }
  button { font: inherit; cursor: pointer; }
  input, textarea, select { font: inherit; color: inherit; }
  a.ilink { color: var(--accent); border-bottom: 1px solid rgba(42,95,79,.35); text-decoration: none; }
  a.ilink:hover { border-bottom-color: var(--accent); }
  .mono { font-family: var(--mono); letter-spacing: -0.005em; }
  .kicker { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--ink-faint); }

  /* Top nav */
  .topnav { background: rgba(245,242,236,0.9); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10; }
  .topnav-inner { max-width: 1160px; margin: 0 auto; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .brand { display: inline-flex; align-items: center; gap: 10px; font-family: var(--serif); font-weight: 600; font-size: 18px; color: var(--ink); text-decoration: none; white-space: nowrap; }
  .brand-mark { display: inline-grid; place-items: center; width: 28px; height: 28px; background: var(--accent); color: var(--accent-ink); font-family: var(--serif); font-weight: 700; font-size: 14px; }
  .back-link { font-size: 14px; color: var(--ink-2); text-decoration: none; font-family: var(--mono); letter-spacing: -0.01em; }
  .back-link:hover { color: var(--accent); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 24px; font-size: 15px; font-weight: 500; border-radius: 2px; border: 1px solid transparent; transition: all 150ms ease; background: var(--ink); color: var(--bg); }
  .btn:hover { background: var(--accent); color: var(--accent-ink); }
  .btn-wide { width: 100%; padding: 16px; font-size: 16px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; background: var(--ink-dim); }

  /* Date + time shared */
  .date-strip { display: flex; gap: 10px; }
  .date-chip { flex: 1; background: var(--bg-card); border: 1px solid var(--line-2); padding: 14px 12px; text-align: center; border-radius: 2px; cursor: pointer; transition: all 150ms; display: flex; flex-direction: column; gap: 4px; }
  .date-chip:hover { border-color: var(--accent); }
  .date-chip.is-selected { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .date-chip.is-selected .date-chip-dow, .date-chip.is-selected .date-chip-mon { color: rgba(245,242,236,0.75); }
  .date-chip-pill { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); height: 11px; line-height: 11px; }
  .date-chip.is-selected .date-chip-pill { color: var(--accent-ink); }
  .date-chip-day { font-family: var(--serif); font-weight: 500; font-size: 28px; line-height: 1; letter-spacing: -0.01em; }
  .date-chip-dow, .date-chip-mon { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint); }

  .time-group-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); margin: 20px 0 10px; }
  .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .time-slot { background: var(--bg-card); border: 1px solid var(--line-2); padding: 12px 8px; border-radius: 2px; font-family: var(--mono); font-size: 13px; color: var(--ink); cursor: pointer; transition: all 120ms; text-align: center; }
  .time-slot:hover:not(:disabled):not(.is-selected) { border-color: var(--accent); }
  .time-slot.is-selected { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .time-slot:disabled { color: var(--ink-faint); text-decoration: line-through; cursor: not-allowed; background: transparent; border-color: var(--line); }

  /* Form */
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .field-label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-dim); }
  .field-hint { font-size: 13px; color: var(--ink-faint); margin-top: -2px; }
  .input, .textarea, .select { background: var(--bg-card); border: 1px solid var(--line-2); border-radius: 2px; padding: 12px 14px; font-size: 15px; color: var(--ink); font-family: var(--sans); transition: border-color 150ms; width: 100%; }
  .input:focus, .textarea:focus, .select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,95,79,0.12); }
  .textarea { min-height: 96px; resize: vertical; font-family: var(--serif); line-height: 1.5; }
  .radio-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .radio-tile { background: var(--bg-card); border: 1px solid var(--line-2); border-radius: 2px; padding: 14px; cursor: pointer; transition: all 150ms; text-align: left; }
  .radio-tile:hover { border-color: var(--accent); }
  .radio-tile.is-selected { background: var(--accent-faint); border-color: var(--accent); }
  .radio-tile-label { font-family: var(--serif); font-weight: 500; font-size: 16px; line-height: 1.2; }
  .radio-tile-sub { font-size: 12px; color: var(--ink-dim); margin-top: 2px; }

  /* Editorial paper */
  .paper { max-width: 760px; margin: 48px auto; background: var(--bg-card); border: 1px solid var(--line-2); padding: 64px 80px 80px; position: relative; }
  .marginalia { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); line-height: 1.7; padding-bottom: 24px; margin-bottom: 24px; border-bottom: 1px solid var(--line); display: flex; gap: 24px; flex-wrap: wrap; }
  .marginalia span { display: inline-flex; align-items: center; gap: 6px; }
  .marginalia span::before { content: "·"; color: var(--ink-faint); }
  .marginalia span:first-child::before { display: none; }
  .salutation { font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--ink-dim); margin: 0 0 8px; }
  .headline { font-family: var(--serif); font-weight: 500; font-size: 42px; line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 28px; text-wrap: pretty; }
  .headline em { color: var(--accent); font-style: italic; }
  .body { font-family: var(--serif); font-size: 18px; line-height: 1.65; color: var(--ink-2); margin: 0 0 16px; }
  .divider { height: 1px; background: var(--line); margin: 40px 0; position: relative; }
  .divider::before { content: "§"; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: var(--bg-card); padding: 0 16px; color: var(--ink-faint); font-family: var(--serif); font-size: 20px; font-style: italic; }
  .section-h { font-family: var(--serif); font-style: italic; font-weight: 500; font-size: 22px; margin: 0 0 20px; color: var(--ink); }
  .signature { font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--ink); margin-top: 40px; letter-spacing: -0.01em; }
  .signoff-sub { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint); margin-top: 4px; }

  /* Confirmation */
  .confirm-check { width: 56px; height: 56px; background: var(--accent); border-radius: 50%; display: grid; place-items: center; color: var(--accent-ink); }
  .confirm-summary { display: grid; grid-template-columns: 140px 1fr; gap: 12px 24px; font-size: 15px; padding: 24px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin: 24px 0; }
  .confirm-summary dt { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint); margin: 0; }
  .confirm-summary dd { margin: 0; color: var(--ink); }
  .prep-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 16px; }
  .prep-list li { display: grid; grid-template-columns: 24px 1fr; gap: 16px; font-family: var(--serif); font-size: 17px; line-height: 1.5; color: var(--ink-2); }
  .prep-num { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 600; padding-top: 4px; }

  @media (max-width: 768px) {
    .paper { padding: 40px 28px 56px; margin: 24px 16px; }
    .headline { font-size: 32px; }
    .time-grid { grid-template-columns: repeat(3, 1fr); }
    .radio-group { grid-template-columns: 1fr; }
    .confirm-summary { grid-template-columns: 1fr; gap: 4px 0; }
    .confirm-summary dt { margin-top: 12px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="book.jsx"></script>
</body>
</html>
