<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Code-Rescue — Variations</title>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#0b0c0d"/><rect x="30" y="30" width="40" height="40" fill="#d9ff5c"/><text x="50" y="58" font-family="ui-monospace,monospace" font-size="18" font-weight="700" text-anchor="middle" fill="#0b0c0d">CR</text></svg></template>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin:0; padding:0; background:#0b0c0d; }
  iframe { border: 0; display: block; width: 100%; height: 100%; background: #0b0c0d; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function Board({ query, subtitle }) {
  const src = `Code-Rescue Services.html?${query}`;
  return <iframe src={src} title={subtitle} />;
}

function App() {
  const BOARD_W = 1280;
  const BOARD_H = 3600;
  return (
    <DesignCanvas title="Code-Rescue — Services page · four directions">
      <DCSection id="variants" title="Register variations" subtitle="Same content, four visual registers. Double-click any artboard to open it fullscreen.">
        <DCArtboard id="terminal" label="01 · Terminal — engineering logbook" width={BOARD_W} height={BOARD_H}>
          <Board query="register=terminal&density=high&accent=d9ff5c" subtitle="Terminal" />
        </DCArtboard>

        <DCArtboard id="editorial" label="02 · Editorial — warm paper, long-read" width={BOARD_W} height={BOARD_H}>
          <Board query="register=editorial&density=high&accent=c4410a" subtitle="Editorial" />
        </DCArtboard>

        <DCArtboard id="spec" label="03 · Spec doc — RFC / ISO registry" width={BOARD_W} height={BOARD_H}>
          <Board query="register=spec&density=medium&accent=1144cc" subtitle="Spec doc" />
        </DCArtboard>

        <DCArtboard id="brutalist" label="04 · Brutalist — oversized editorial, near-black" width={BOARD_W} height={BOARD_H}>
          <Board query="register=terminal&variant=brutalist&density=high&accent=ff5a1f" subtitle="Brutalist" />
        </DCArtboard>

        <DCArtboard id="craft" label="05 · Craft — live system, behind-the-scenes rigor" width={BOARD_W} height={BOARD_H}>
          <iframe src="Code-Rescue Services Craft.html" title="Craft" style={{ border:0, display:"block", width:"100%", height:"100%", background:"#0b0c0d" }} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
